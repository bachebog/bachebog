<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F5C518">
  <link rel="manifest" href="/bachebog/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BacheBog">
  <title>BacheBog — Foro Ciudadano</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #1A1A2E;
      --surface: #16213E;
      --surface2:#0F3460;
      --accent:  #F5C518;
      --text:    #F0F2F8;
      --text2:   #9BA3C0;
      --text3:   #5A6080;
      --danger:  #FF3A5C;
      --success: #3AE3B7;
      --radius:  16px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body { display: flex; justify-content: center; }

    .app-shell {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 52px 20px 14px;
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(10,10,20,0.95) 70%, transparent 100%);
      position: relative; z-index: 10;
    }
    .back-btn {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 18px; color: var(--text2);
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .back-btn:hover  { background: rgba(255,255,255,0.09); border-color: rgba(245,197,24,0.25); }
    .back-btn:active { transform: scale(0.93); }
    .top-title { font-size: 20px; font-weight: 900; }
    .top-count {
      margin-left: auto;
      font-size: 12px; font-weight: 700; color: var(--text3);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 4px 12px;
    }

    /* ── SEARCH ── */
    .search-wrap {
      padding: 0 16px 10px;
      flex-shrink: 0;
    }
    .search-inner {
      position: relative;
    }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: rgba(15,52,96,0.5);
      border: 1.5px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 12px 16px 12px 42px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 600;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .search-input::placeholder { color: var(--text3); font-weight: 500; }
    .search-input:focus {
      border-color: var(--accent);
      background: rgba(15,52,96,0.7);
      box-shadow: 0 0 0 3px rgba(245,197,24,0.09);
    }

    /* ── SORT FILTERS ── */
    .sort-wrap {
      padding: 0 16px 12px;
      flex-shrink: 0;
    }
    .sort-track {
      display: flex; gap: 8px;
      overflow-x: auto; padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }
    .sort-track::-webkit-scrollbar { display: none; }
    .sort-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      font-family: 'Nunito', sans-serif;
      font-size: 12px; font-weight: 700; color: var(--text3);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .sort-btn:active { transform: scale(0.95); }
    .sort-btn.active {
      background: rgba(245,197,24,0.13);
      border-color: rgba(245,197,24,0.40);
      color: var(--accent);
    }

    /* ── SCROLL LIST ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 32px;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── SKELETON ── */
    .sk-card {
      background: var(--surface);
      border: 1.5px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px;
    }
    .sk-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
    .sk-circle {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .sk-line {
      height: 11px; border-radius: 6px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    .sk-line.w80 { width: 80%; }
    .sk-line.w55 { width: 55%; }
    .sk-line.w35 { width: 35%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── FORUM CARD ── */
    .forum-card {
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.07);
      transition: border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.35s ease forwards;
      opacity: 0;
    }
    .forum-card:hover { border-color: rgba(245,197,24,0.18); transform: translateY(-1px); }

    /* severity accent strip on left */
    .forum-card.sev-leve     { border-left: 3px solid rgba(58,227,183,0.6); }
    .forum-card.sev-moderado { border-left: 3px solid rgba(245,197,24,0.6); }
    .forum-card.sev-grave    { border-left: 3px solid rgba(255,58,92,0.7);  }

    .card-body { padding: 14px 14px 12px; }

    /* user row */
    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px;
    }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #0A0B0E;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 13px; font-weight: 800;
      color: var(--text);
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .badge-verified {
      font-size: 9px; font-weight: 800;
      letter-spacing: 0.5px; text-transform: uppercase;
      background: rgba(58,227,183,0.12);
      border: 1px solid rgba(58,227,183,0.25);
      color: var(--success);
      padding: 2px 7px; border-radius: 10px;
      flex-shrink: 0;
    }
    .user-time { font-size: 11px; font-weight: 600; color: var(--text3); }

    /* content */
    .card-address {
      font-size: 15px; font-weight: 800;
      color: var(--text);
      margin-bottom: 8px; line-height: 1.3;
    }

    .card-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 8px;
    }
    .tag {
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .tag-tipo {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--text2);
    }
    .tag-sev-leve     { background: rgba(58,227,183,0.12); border: 1px solid rgba(58,227,183,0.25); color: var(--success); }
    .tag-sev-moderado { background: rgba(245,197,24,0.12);  border: 1px solid rgba(245,197,24,0.25);  color: var(--accent); }
    .tag-sev-grave    { background: rgba(255,58,92,0.12);   border: 1px solid rgba(255,58,92,0.25);   color: var(--danger); }
    .tag-estado-pendiente   { background: rgba(255,58,92,0.10);  border: 1px solid rgba(255,58,92,0.20);  color: #FF3A5C; }
    .tag-estado-en-revision { background: rgba(245,197,24,0.10); border: 1px solid rgba(245,197,24,0.25); color: var(--accent); }
    .tag-estado-resuelto    { background: rgba(58,227,183,0.10); border: 1px solid rgba(58,227,183,0.22); color: var(--success); }

    .card-desc {
      font-size: 13px; font-weight: 600;
      color: var(--text3); line-height: 1.5;
      margin-bottom: 12px;
    }

    /* card footer */
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .foot-left {
      display: flex; align-items: center; gap: 8px;
    }

    /* vote button */
    .vote-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 800;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .vote-btn:active { transform: scale(0.94); }
    .vote-btn.voted {
      background: rgba(245,197,24,0.13);
      border-color: rgba(245,197,24,0.40);
      color: var(--accent);
    }
    .vote-btn.voted .vote-icon { filter: grayscale(0); }
    .vote-icon { font-size: 15px; transition: transform 0.2s; }
    .vote-btn:not(.voted):hover .vote-icon { transform: scale(1.2); }

    /* ── EMPTY / NO MATCH ── */
    .empty-state, .no-match {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 52px 28px;
    }
    .empty-state.visible, .no-match.visible { display: flex; }
    .empty-icon  { font-size: 52px; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-size: 17px; font-weight: 800; color: var(--text2); margin-bottom: 8px; }
    .empty-sub   { font-size: 13px; font-weight: 600; color: var(--text3); line-height: 1.5; }

    /* ── LOADING OVERLAY ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(245,197,24,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* vote pop animation */
    @keyframes votePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .vote-pop { animation: votePop 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="app-shell">

    <!-- Top Bar -->
    <div class="top-bar">
      <a href="home.html" class="back-btn" title="Volver">←</a>
      <div class="top-title">👥 Foro Ciudadano</div>
      <div class="top-count" id="topCount">—</div>
    </div>

    <!-- Búsqueda -->
    <div class="search-wrap">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Buscar por dirección o barrio..."
          autocomplete="off"
        >
      </div>
    </div>

    <!-- Sort -->
    <div class="sort-wrap">
      <div class="sort-track">
        <button class="sort-btn" data-sort="urgente" onclick="setSort(this)">🚨 Más urgentes</button>
        <button class="sort-btn active" data-sort="votos"   onclick="setSort(this)">👍 Más votos</button>
        <button class="sort-btn" data-sort="reciente" onclick="setSort(this)">🕐 Recientes</button>
      </div>
    </div>

    <!-- Lista -->
    <div class="scroll-area" id="scrollArea">

      <!-- Skeletons -->
      <div id="skeletons">
        <div class="sk-card"><div class="sk-row"><div class="sk-circle"></div><div class="sk-lines"><div class="sk-line w80"></div><div class="sk-line w55"></div></div></div><div class="sk-line w80" style="margin-bottom:8px"></div><div class="sk-line w55"></div></div>
        <div class="sk-card"><div class="sk-row"><div class="sk-circle"></div><div class="sk-lines"><div class="sk-line w80"></div><div class="sk-line w55"></div></div></div><div class="sk-line w80" style="margin-bottom:8px"></div><div class="sk-line w35"></div></div>
        <div class="sk-card"><div class="sk-row"><div class="sk-circle"></div><div class="sk-lines"><div class="sk-line w80"></div><div class="sk-line w55"></div></div></div><div class="sk-line w80" style="margin-bottom:8px"></div><div class="sk-line w55"></div></div>
      </div>

      <!-- Cards container -->
      <div id="cardList"></div>

      <!-- Empty total -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🕳️</div>
        <div class="empty-title">No hay reportes aún.</div>
        <div class="empty-sub">¡Sé el primero en reportar<br>un hueco en Bogotá!</div>
      </div>

      <!-- No match búsqueda -->
      <div class="no-match" id="noMatch">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Sin resultados.</div>
        <div class="empty-sub">Intenta con otra dirección<br>o barrio.</div>
      </div>

    </div><!-- /scroll-area -->
  </div>

  <script type="module">
    import { initializeApp }           from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, increment, query, orderBy }
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7hT8OdmL6MMvSmfv9PRoQT0-4mhTBBB0",
      authDomain: "bachebog-7393e.firebaseapp.com",
      projectId: "bachebog-7393e",
      storageBucket: "bachebog-7393e.firebasestorage.app",
      messagingSenderId: "712370826301",
      appId: "1:712370826301:web:19c8f77f773b615663ce54"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const overlay  = document.getElementById('loadingOverlay');
    const cardList = document.getElementById('cardList');
    const skeletons= document.getElementById('skeletons');
    const emptyState=document.getElementById('emptyState');
    const noMatch  = document.getElementById('noMatch');
    const topCount = document.getElementById('topCount');
    const searchEl = document.getElementById('searchInput');

    let allReports = [];
    let activeSort = 'votos';
    let searchTerm = '';
    let currentUid = null;

    // ── Auth guard ──
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.replace('../index.html'); return; }
      currentUid = user.uid;

      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 300);

      await loadReports();
    });

    // ── Cargar todos los reportes ──
    async function loadReports() {
      try {
        const snap = await getDocs(collection(db, 'reportes'));
        allReports = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch {
        allReports = [];
      }
      skeletons.remove();
      topCount.textContent = allReports.length;
      render();
    }

    // ── Render ──
    function render() {
      cardList.innerHTML = '';
      emptyState.classList.remove('visible');
      noMatch.classList.remove('visible');

      if (allReports.length === 0) { emptyState.classList.add('visible'); return; }

      // 1. Filtrar por búsqueda
      const term = searchTerm.toLowerCase();
      let list = term
        ? allReports.filter(r => (r.direccion || '').toLowerCase().includes(term))
        : [...allReports];

      // 2. Ordenar
      const sevOrder = { 'Grave': 0, 'Moderado': 1, 'Leve': 2 };
      if (activeSort === 'urgente') {
        list.sort((a, b) => (sevOrder[a.severidad] ?? 1) - (sevOrder[b.severidad] ?? 1));
      } else if (activeSort === 'votos') {
        list.sort((a, b) => (b.votos ?? 0) - (a.votos ?? 0));
      } else {
        list.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
      }

      if (list.length === 0) { noMatch.classList.add('visible'); return; }

      list.forEach((r, i) => {
        const card = buildCard(r, i);
        cardList.appendChild(card);
      });
    }

    // ── Construir tarjeta ──
    function buildCard(r, index) {
      const div = document.createElement('div');
      const sevKey = (r.severidad || 'Moderado').toLowerCase();
      div.className = `forum-card sev-${sevKey}`;
      div.style.animationDelay = `${Math.min(index * 0.04, 0.4)}s`;

      const inicial  = (r.nombreUsuario || 'U')[0].toUpperCase();
      const avatarBg = stringToColor(r.userId || r.nombreUsuario || 'x');
      const isVerified = false; // futuro: calcular con conteo de reportes por usuario

      const sevTagClass = { 'leve': 'tag-sev-leve', 'moderado': 'tag-sev-moderado', 'grave': 'tag-sev-grave' }[sevKey] || 'tag-sev-moderado';
      const sevLabel    = r.severidad || 'Moderado';
      const sevEmoji    = { 'Leve': '🟢', 'Moderado': '🟡', 'Grave': '🔴' }[r.severidad] || '🟡';

      const estadoKey  = (r.estado || 'Pendiente').toLowerCase().replace(' ', '-');
      const estadoClass= { 'pendiente': 'tag-estado-pendiente', 'en-revisión': 'tag-estado-en-revision', 'resuelto': 'tag-estado-resuelto' }[estadoKey] || 'tag-estado-pendiente';

      const desc  = r.descripcion ? truncate(r.descripcion, 80) : '';
      const tiempo= timeAgo(r.fecha);
      const votos = r.votos ?? 0;
      const voted = localStorage.getItem(`votado_${r.id}`) === '1';

      div.innerHTML = `
        <div class="card-body">
          <div class="user-row">
            <div class="avatar" style="background:${avatarBg}">${esc(inicial)}</div>
            <div class="user-info">
              <div class="user-name">
                ${esc(r.nombreUsuario || 'Ciudadano')}
                ${isVerified ? '<span class="badge-verified">✓ Verificado</span>' : ''}
              </div>
              <div class="user-time">${tiempo}</div>
            </div>
          </div>

          <div class="card-address">${esc(r.direccion || 'Sin dirección')}</div>

          <div class="card-tags">
            <span class="tag tag-tipo">🔧 ${esc(r.tipo || '—')}</span>
            <span class="tag ${sevTagClass}">${sevEmoji} ${esc(sevLabel)}</span>
            <span class="tag ${estadoClass}">${esc(r.estado || 'Pendiente')}</span>
          </div>

          ${desc ? `<div class="card-desc">${esc(desc)}</div>` : ''}

          <div class="card-foot">
            <div class="foot-left">
              <button
                class="vote-btn ${voted ? 'voted' : ''}"
                id="vbtn-${r.id}"
                onclick="handleVote('${r.id}', this)"
              >
                <span class="vote-icon">👍</span>
                <span id="vcount-${r.id}">${votos}</span>
              </button>
            </div>
          </div>
        </div>
      `;
      return div;
    }

    // ── Votar ──
    window.handleVote = async function(reportId, btn) {
      const alreadyVoted = localStorage.getItem(`votado_${reportId}`) === '1';
      if (alreadyVoted) return; // ya votó, no hacer nada

      // Optimista: actualizar UI inmediatamente
      const countEl = document.getElementById(`vcount-${reportId}`);
      const current = parseInt(countEl.textContent) || 0;
      countEl.textContent = current + 1;
      btn.classList.add('voted');

      // Animación pop
      btn.classList.remove('vote-pop');
      void btn.offsetWidth;
      btn.classList.add('vote-pop');

      // Guardar en localStorage
      localStorage.setItem(`votado_${reportId}`, '1');

      // Actualizar también en allReports
      const rep = allReports.find(r => r.id === reportId);
      if (rep) rep.votos = (rep.votos ?? 0) + 1;

      // Persistir en Firestore
      try {
        await updateDoc(doc(db, 'reportes', reportId), { votos: increment(1) });
      } catch {
        // Revertir si falla
        countEl.textContent = current;
        btn.classList.remove('voted');
        localStorage.removeItem(`votado_${reportId}`);
        if (rep) rep.votos = (rep.votos ?? 1) - 1;
      }
    };

    // ── Sort ──
    window.setSort = function(btn) {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeSort = btn.dataset.sort;
      render();
    };

    // ── Búsqueda ──
    let searchTimer;
    searchEl.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchTerm = searchEl.value.trim();
        render();
      }, 250);
    });

    // ── Helpers ──
    function timeAgo(iso) {
      if (!iso) return '—';
      const diff = Date.now() - new Date(iso).getTime();
      const mins  = Math.floor(diff / 60000);
      const hours = Math.floor(mins / 60);
      const days  = Math.floor(hours / 24);
      if (mins < 1)   return 'Ahora mismo';
      if (mins < 60)  return `Hace ${mins}min`;
      if (hours < 24) return `Hace ${hours}h`;
      if (days === 1) return 'Hace 1 día';
      return `Hace ${days} días`;
    }

    function truncate(str, max) {
      return str.length <= max ? str : str.slice(0, max).trimEnd() + '…';
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Color determinista según string (userId)
    function stringToColor(str) {
      const colors = [
        '#F5C518','#3AE3B7','#FF5E3A','#7B6EF6',
        '#3AB0FF','#FF9A3C','#E879A0','#50C878',
      ];
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return colors[Math.abs(hash) % colors.length];
    }
  </script>
