<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F5C518">
  <link rel="manifest" href="/bachebog/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BacheBog">
  <title>BacheBog — Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #1A1A2E;
      --surface: #16213E;
      --surface2:#0F3460;
      --accent:  #F5C518;
      --text:    #F0F2F8;
      --text2:   #9BA3C0;
      --text3:   #5A6080;
      --danger:  #FF3A5C;
      --success: #3AE3B7;
      --radius:  16px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body { display: flex; justify-content: center; }

    .app-shell {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 52px 20px 14px;
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(10,10,20,0.92) 60%, transparent 100%);
      position: sticky; top: 0; z-index: 10;
    }
    .back-btn {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 18px; color: var(--text2);
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .back-btn:hover  { background: rgba(255,255,255,0.09); }
    .back-btn:active { transform: scale(0.93); }
    .top-title { font-size: 20px; font-weight: 900; }

    /* ── SCROLL ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 48px;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── HERO DEL PERFIL ── */
    .profile-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px 0 28px;
      animation: fadeUp 0.4s ease forwards;
    }

    .avatar-wrap { position: relative; }
    .avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: 900;
      color: #0A0B0E;
      box-shadow: 0 0 0 4px rgba(245,197,24,0.18), 0 8px 28px rgba(245,197,24,0.25);
    }
    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      border: 2px solid rgba(245,197,24,0.30);
    }

    .profile-name {
      font-size: 22px; font-weight: 900;
      color: var(--text);
      text-align: center;
    }
    .profile-email {
      font-size: 13px; font-weight: 600;
      color: var(--text3);
      text-align: center;
    }

    /* Level badge */
    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px; font-weight: 800;
      background: rgba(245,197,24,0.12);
      border: 1.5px solid rgba(245,197,24,0.28);
      color: var(--accent);
      letter-spacing: 0.3px;
    }

    /* Skeleton */
    .skeleton {
      display: inline-block;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── STATS CARD ── */
    .stats-card {
      background: var(--surface);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 20px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      margin-bottom: 22px;
      animation: fadeUp 0.4s ease 0.08s forwards;
      opacity: 0;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
    }
    .stat-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0; top: 10%; bottom: 10%;
      width: 1px;
      background: rgba(255,255,255,0.08);
    }

    .stat-number {
      font-size: 28px; font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }
    .stat-number.loading {
      width: 40px; height: 28px;
      border-radius: 8px;
    }
    .stat-label {
      font-size: 11px; font-weight: 700;
      color: var(--text3);
      text-align: center;
      letter-spacing: 0.3px;
      line-height: 1.3;
    }

    /* ── SECTION ── */
    .section-title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.8px; text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    /* ── LIST ITEMS ── */
    .list-card {
      background: var(--surface);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 22px;
      animation: fadeUp 0.4s ease 0.14s forwards;
      opacity: 0;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 16px;
      cursor: default;
      transition: background 0.15s;
      position: relative;
    }
    .list-item:not(:last-child)::after {
      content: '';
      position: absolute;
      bottom: 0; left: 16px; right: 16px;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }
    .list-item.clickable { cursor: pointer; }
    .list-item.clickable:hover  { background: rgba(255,255,255,0.03); }
    .list-item.clickable:active { background: rgba(255,255,255,0.06); }

    .item-icon {
      width: 38px; height: 38px;
      border-radius: 11px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .item-content { flex: 1; min-width: 0; }
    .item-label {
      font-size: 15px; font-weight: 700;
      color: var(--text);
    }
    .item-sub {
      font-size: 12px; font-weight: 600;
      color: var(--text3);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-right {
      font-size: 12px; font-weight: 600;
      color: var(--text3);
      flex-shrink: 0;
    }
    .item-arrow {
      font-size: 16px;
      color: var(--text3);
      flex-shrink: 0;
    }

    /* ── TOGGLE ── */
    .toggle-wrap {
      position: relative;
      width: 44px; height: 24px;
      flex-shrink: 0;
    }
    .toggle-input {
      position: absolute; opacity: 0;
      width: 100%; height: 100%;
      cursor: pointer; margin: 0; z-index: 2;
    }
    .toggle-track {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      transition: background 0.2s;
    }
    .toggle-input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle-input:checked ~ .toggle-thumb { transform: translateX(20px); }

    /* ── LOGOUT BUTTON ── */
    .btn-logout {
      width: 100%;
      padding: 16px;
      background: rgba(255,58,92,0.10);
      border: 1.5px solid rgba(255,58,92,0.25);
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800;
      color: var(--danger);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.4s ease 0.20s forwards;
      opacity: 0;
    }
    .btn-logout:hover  { background: rgba(255,58,92,0.16); border-color: rgba(255,58,92,0.40); }
    .btn-logout:active { transform: scale(0.98); }

    /* ── LOADING OVERLAY ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(245,197,24,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="app-shell">

    <!-- Top Bar -->
    <div class="top-bar">
      <a href="home.html" class="back-btn" title="Volver">←</a>
      <div class="top-title">👤 Perfil</div>
    </div>

    <div class="scroll-area">

      <!-- ── HERO ── -->
      <div class="profile-hero">
        <div class="avatar-wrap">
          <div class="avatar" id="avatar">?</div>
          <div class="avatar-ring"></div>
        </div>
        <div class="profile-name"  id="profileName"><span class="skeleton" style="width:160px;height:24px;display:inline-block"></span></div>
        <div class="profile-email" id="profileEmail"><span class="skeleton" style="width:200px;height:16px;display:inline-block"></span></div>
        <div class="level-badge"   id="levelBadge"><span class="skeleton" style="width:180px;height:18px;display:inline-block"></span></div>
      </div>

      <!-- ── STATS ── -->
      <div class="stats-card">
        <div class="stat-item">
          <div class="stat-number skeleton loading" id="statTotal"></div>
          <div class="stat-label">Total<br>reportes</div>
        </div>
        <div class="stat-item">
          <div class="stat-number skeleton loading" id="statResueltos"></div>
          <div class="stat-label">Resueltos</div>
        </div>
        <div class="stat-item">
          <div class="stat-number skeleton loading" id="statVotos"></div>
          <div class="stat-label">Votos<br>recibidos</div>
        </div>
      </div>

      <!-- ── MI CUENTA ── -->
      <div class="section-title">Mi Cuenta</div>
      <div class="list-card">

        <!-- Datos personales -->
        <div class="list-item">
          <div class="item-icon">👤</div>
          <div class="item-content">
            <div class="item-label">Datos personales</div>
            <div class="item-sub" id="datosPersonalesSub">Cargando…</div>
          </div>
        </div>

        <!-- Notificaciones -->
        <div class="list-item">
          <div class="item-icon">🔔</div>
          <div class="item-content">
            <div class="item-label">Notificaciones</div>
            <div class="item-sub" id="notiSub">Activas</div>
          </div>
          <label class="toggle-wrap" title="Activar notificaciones">
            <input type="checkbox" class="toggle-input" id="notiToggle" onchange="toggleNotificaciones(this.checked)">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>

        <!-- Seguridad -->
        <div class="list-item">
          <div class="item-icon">🔒</div>
          <div class="item-content">
            <div class="item-label">Seguridad</div>
            <div class="item-sub">Contraseña: ••••••••</div>
          </div>
        </div>

      </div><!-- /list-card -->

      <!-- ── CERRAR SESIÓN ── -->
      <button class="btn-logout" id="logoutBtn" onclick="handleLogout()">
        🚪 Cerrar sesión
      </button>

    </div><!-- /scroll-area -->
  </div><!-- /app-shell -->

  <script type="module">
    import { initializeApp }                         from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs }
      from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7hT8OdmL6MMvSmfv9PRoQT0-4mhTBBB0",
      authDomain: "bachebog-7393e.firebaseapp.com",
      projectId: "bachebog-7393e",
      storageBucket: "bachebog-7393e.firebasestorage.app",
      messagingSenderId: "712370826301",
      appId: "1:712370826301:web:19c8f77f773b615663ce54"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const overlay = document.getElementById('loadingOverlay');

    // ── Auth guard ──
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.replace('../index.html'); return; }

      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 300);

      await loadProfile(user);
    });

    // ── Cargar perfil ──
    async function loadProfile(user) {
      // 1. Datos básicos de Firestore/Auth
      let nombre = user.displayName || user.email.split('@')[0];
      let email  = user.email;

      try {
        const snap = await getDoc(doc(db, 'usuarios', user.uid));
        if (snap.exists()) {
          nombre = snap.data().nombre || nombre;
        }
      } catch { /* usar datos de Auth */ }

      // Actualizar hero
      const inicial = nombre.charAt(0).toUpperCase();
      document.getElementById('avatar').textContent        = inicial;
      document.getElementById('profileName').textContent   = nombre;
      document.getElementById('profileEmail').textContent  = email;
      document.getElementById('datosPersonalesSub').textContent = nombre + ' · ' + email;

      // 2. Estadísticas: leer todos los reportes del usuario
      let reportes   = [];
      try {
        const q = query(collection(db, 'reportes'), where('userId', '==', user.uid));
        const snap2 = await getDocs(q);
        reportes = snap2.docs.map(d => d.data());
      } catch { reportes = []; }

      const total     = reportes.length;
      const resueltos = reportes.filter(r => r.estado === 'Resuelto').length;
      const votos     = reportes.reduce((sum, r) => sum + (r.votos || 0), 0);

      // Actualizar stats (quitar skeleton)
      setStatNumber('statTotal',     total);
      setStatNumber('statResueltos', resueltos);
      setStatNumber('statVotos',     votos);

      // 3. Badge de nivel
      document.getElementById('levelBadge').textContent = getLevel(total);

      // 4. Toggle de notificaciones (localStorage)
      const notiOn = localStorage.getItem('noti_enabled') !== 'false';
      document.getElementById('notiToggle').checked = notiOn;
      document.getElementById('notiSub').textContent = notiOn ? 'Activas' : 'Desactivadas';
    }

    function setStatNumber(id, value) {
      const el = document.getElementById(id);
      el.classList.remove('skeleton', 'loading');
      el.textContent = value;
      el.style.color = 'var(--accent)';
    }

    function getLevel(total) {
      if (total >= 16) return 'Reportero Élite Nivel 4 ⭐⭐⭐⭐';
      if (total >= 8)  return 'Reportero Experto Nivel 3 ⭐⭐⭐';
      if (total >= 3)  return 'Reportero Activo Nivel 2 ⭐⭐';
      return                  'Reportero Nivel 1 ⭐';
    }

    // ── Toggle notificaciones ──
    window.toggleNotificaciones = function(on) {
      localStorage.setItem('noti_enabled', on ? 'true' : 'false');
      document.getElementById('notiSub').textContent = on ? 'Activas' : 'Desactivadas';
    };

    // ── Cerrar sesión ──
    window.handleLogout = async function() {
      if (!confirm('¿Cerrar sesión de BacheBog?')) return;
      try {
        await signOut(auth);
        window.location.replace('../index.html');
      } catch {
        alert('Error al cerrar sesión. Intenta de nuevo.');
      }
    };
  </script>
</body>
</html>
