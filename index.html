<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F5C518">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BacheBog">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>BacheBog 🚧 — Reporta Bogotá</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1A1A2E;
      --surface: #16213E;
      --surface2: #0F3460;
      --accent: #F5C518;
      --accent-dark: #d4a900;
      --text: #F0F2F8;
      --text2: #9BA3C0;
      --text3: #5A6080;
      --danger: #FF3A5C;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px env(safe-area-inset-bottom, 24px);
      overflow: hidden;
      position: relative;
    }

    /* ── BACKGROUND ATMOSPHERE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 80% 10%, rgba(245,197,24,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 10% 90%, rgba(15,52,96,0.60) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Road stripes background decoration */
    .road-deco {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: linear-gradient(180deg, transparent 0%, rgba(10,10,20,0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }
    .road-deco::after {
      content: '';
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      height: 6px;
      background: repeating-linear-gradient(90deg, rgba(245,197,24,0.35) 0px, rgba(245,197,24,0.35) 36px, transparent 36px, transparent 56px);
      border-radius: 3px;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(22, 33, 62, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 36px 28px 32px;
      width: 100%;
      max-width: 390px;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.6),
        0 0 0 1px rgba(245,197,24,0.06),
        inset 0 1px 0 rgba(255,255,255,0.07);
      animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── LOGO AREA ── */
    .logo-area {
      text-align: center;
      margin-bottom: 30px;
    }

    .pothole-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      background: rgba(245,197,24,0.12);
      border: 2px solid rgba(245,197,24,0.25);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 24px rgba(245,197,24,0.15);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(245,197,24,0.15); }
      50%       { box-shadow: 0 8px 36px rgba(245,197,24,0.30); }
    }

    .logo-title {
      font-size: 34px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 1.5px;
      line-height: 1;
      text-shadow: 0 0 30px rgba(245,197,24,0.25);
    }

    .logo-subtitle {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text3);
      margin-top: 6px;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .divider-text { font-size: 11px; color: var(--text3); font-weight: 600; }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      color: var(--text3);
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      background: rgba(15,52,96,0.5);
      border: 1.5px solid rgba(255,255,255,0.09);
      border-radius: var(--radius);
      padding: 14px 16px 14px 44px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--text3); font-weight: 500; }
    .form-input:focus {
      border-color: var(--accent);
      background: rgba(15,52,96,0.7);
      box-shadow: 0 0 0 3px rgba(245,197,24,0.10);
    }

    /* ── ERROR MESSAGE ── */
    .error-msg {
      display: none;
      background: rgba(255,58,92,0.12);
      border: 1px solid rgba(255,58,92,0.30);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--danger);
      margin-bottom: 16px;
      text-align: center;
    }
    .error-msg.visible { display: block; animation: shake 0.35s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* ── BUTTON ── */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #0A0B0E;
      border: none;
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(245,197,24,0.35);
      margin-top: 4px;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.20) 0%, transparent 60%);
    }
    .btn-primary:hover { box-shadow: 0 10px 32px rgba(245,197,24,0.50); }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner inside button */
    .btn-primary .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(0,0,0,0.3);
      border-top-color: #0A0B0E;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER LINK ── */
    .card-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text3);
      font-weight: 600;
    }
    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="road-deco"></div>

  <div class="card">
    <!-- Logo -->
    <div class="logo-area">
      <div class="pothole-icon">🚧</div>
      <div class="logo-title">BacheBog</div>
      <div class="logo-subtitle">Reporta Bogotá</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Inicia sesión</span>
      <div class="divider-line"></div>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="errorMsg">❌ Credenciales incorrectas. Intenta de nuevo.</div>

    <!-- Form -->
    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="emailInput" class="form-input" placeholder="Correo electrónico" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="passwordInput" class="form-input" placeholder="Contraseña" autocomplete="current-password">
      </div>
    </div>

    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
      Ingresar
    </button>

    <div class="card-footer">
      ¿No tienes cuenta? <a href="pages/registro.html">Regístrate</a>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7hT8OdmL6MMvSmfv9PRoQT0-4mhTBBB0",
      authDomain: "bachebog-7393e.firebaseapp.com",
      projectId: "bachebog-7393e",
      storageBucket: "bachebog-7393e.firebasestorage.app",
      messagingSenderId: "712370826301",
      appId: "1:712370826301:web:19c8f77f773b615663ce54"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Expose login function globally
    window.handleLogin = async function () {
      const email    = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const errorMsg = document.getElementById('errorMsg');
      const loginBtn = document.getElementById('loginBtn');

      // Basic validation
      if (!email || !password) {
        showError('Por favor completa todos los campos.');
        return;
      }

      // Loading state
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span> Ingresando…';
      errorMsg.classList.remove('visible');

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'pages/home.html';
      } catch (error) {
        let msg = 'Credenciales incorrectas. Intenta de nuevo.';
        if (error.code === 'auth/user-not-found') msg = 'No existe una cuenta con ese correo.';
        if (error.code === 'auth/wrong-password')  msg = 'Contraseña incorrecta.';
        if (error.code === 'auth/invalid-email')   msg = 'El correo no es válido.';
        if (error.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Intenta más tarde.';
        showError('❌ ' + msg);
        loginBtn.disabled = false;
        loginBtn.textContent = 'Ingresar';
      }
    };

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.remove('visible');
      void el.offsetWidth; // reflow to restart animation
      el.classList.add('visible');
    }

    // Allow Enter key to submit
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleLogin();
    });
    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('passwordInput').focus();
    });
  </script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/bachebog/sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
